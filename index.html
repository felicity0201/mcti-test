<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTI Protocol - 意识同步评估</title>
    <style>
        :root {
            --bg-color: #0d0d0f;
            --primary-gold: #c9a063;
            --accent-blue: #4facfe;
            --text-color: #e0e0e0;
            --amis-purple: #b19cd9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #quiz-container {
            width: 90%;
            max-width: 550px;
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid rgba(201, 160, 99, 0.2);
            padding: 40px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            position: relative;
        }

        h2 {
            color: var(--primary-gold);
            font-size: 1rem;
            letter-spacing: 3px;
            text-align: center;
            border-bottom: 1px solid rgba(201, 160, 99, 0.3);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 2px;
            background: #222;
            margin-bottom: 30px;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            transition: width 0.4s;
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            min-height: 80px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 0.95rem;
        }

        .option-btn:hover {
            border-color: var(--primary-gold);
            background: rgba(201, 160, 99, 0.05);
        }

        #result-container {
            display: none;
            text-align: center;
        }

        .result-role {
            font-size: 1.8rem;
            color: var(--primary-gold);
            margin: 20px 0;
        }

        .amis-style {
            color: var(--amis-purple) !important;
            text-shadow: 0 0 15px rgba(177, 156, 217, 0.6);
        }

        .last-words {
            font-style: italic;
            margin-top: 50px;
            color: #777;
            font-size: 0.85rem;
            line-height: 1.8;
        }

        /* 故障闪烁效果 */
        .glitch { animation: glitch-anim 0.3s linear; }
        @keyframes glitch-anim {
            0% { opacity: 1; transform: translate(0); }
            20% { opacity: 0.8; transform: translate(-3px, 2px); }
            40% { opacity: 0.9; transform: translate(3px, -2px); }
            100% { opacity: 1; transform: translate(0); }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <h2 id="header-title">MCTI PROTOCOL // 意识同步中</h2>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="qa-section">
        <div class="question-text" id="question">正在初始化系统...</div>
        <div class="options-container" id="options"></div>
    </div>

    <div id="result-container">
        <p style="font-size: 0.9rem; color: #888;">同步完成。匹配频率：</p>
        <div class="result-role" id="role-name"></div>
        <div id="role-desc" style="line-height: 1.6; color: #bbb;"></div>
        <div class="last-words" id="amis-knife"></div>
    </div>
</div>
